<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sniper</h1>

        <div class="controls">
            <div class="input-group">
                <label for="sniper-name">Sniper Name:</label>
                <input type="text" id="sniper-name" placeholder="Enter your sniper name">
            </div>

            <div class="status-section">
                <div class="status-title">Scanner Status</div>
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">Ready to start</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-toggle" id="toggle-btn">Start Scanning</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Keys Generated</div>
                <div class="stat-value" id="keys-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Wallets Found</div>
                <div class="stat-value" id="wallets-found">0</div>
            </div>
        </div>

        <div class="status-section" style="margin-top: 20px;">
            <div class="status-title">Activity Log</div>
            <button class="btn-clear-log" id="clear-log-btn" title="Clear Logs">🗑️</button>
            <div class="log-container" id="log-container">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
